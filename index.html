<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歷史地圖 · Historical Atlas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Cinzel:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;
  --gold-light:#e8d5a3;
  --dark:#1a1510;
  --dark2:#252018;
  --dark3:#2f2920;
  --parchment:#f5edd8;
  --parchment2:#ede0c4;
  --ink:#3d2e1a;
  --red:#8b3a2a;
  --panel-w:380px;
  --timeline-h:90px;
}
html,body{height:100%;overflow:hidden;background:var(--dark);font-family:'Noto Sans TC',sans-serif}

/* ── 頂部標題列 ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:52px;
  background:linear-gradient(180deg,#1a1510 0%,#252018 100%);
  border-bottom:1px solid var(--gold);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:1000;
}
#topbar h1{
  font-family:'Cinzel',serif;font-size:18px;font-weight:600;
  color:var(--gold);letter-spacing:3px;
}
#topbar h1 span{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:300;color:var(--gold-light);margin-left:12px;letter-spacing:1px}

#lang-btn{
  background:transparent;border:1px solid var(--gold);
  color:var(--gold);padding:5px 14px;border-radius:3px;
  font-size:12px;cursor:pointer;letter-spacing:2px;
  font-family:'Cinzel',serif;transition:all .2s;
}
#lang-btn:hover{background:var(--gold);color:var(--dark)}

/* ── 地圖主體 ── */
#map{
  position:fixed;
  top:52px;left:0;right:var(--panel-w);
  bottom:var(--timeline-h);
}

/* ── 側欄 ── */
#panel{
  position:fixed;top:52px;right:0;width:var(--panel-w);
  bottom:var(--timeline-h);
  background:var(--dark2);
  border-left:1px solid #4a3e2a;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#panel-header{
  padding:18px 20px 14px;
  border-bottom:1px solid #3a3020;
  flex-shrink:0;
}
#panel-title{
  font-family:'Cinzel',serif;font-size:14px;color:var(--gold);
  letter-spacing:2px;margin-bottom:4px;
}
#panel-subtitle{font-size:11px;color:#7a6a50;letter-spacing:1px}

#panel-content{flex:1;overflow-y:auto;padding:0}
#panel-content::-webkit-scrollbar{width:4px}
#panel-content::-webkit-scrollbar-track{background:var(--dark2)}
#panel-content::-webkit-scrollbar-thumb{background:#4a3e2a;border-radius:2px}

#welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:30px;text-align:center;
}
#welcome .compass{font-size:48px;margin-bottom:16px;opacity:.4}
#welcome p{font-size:13px;color:#6a5a40;line-height:1.8}
#welcome p span{display:block;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:#4a3e28;margin-top:8px}

/* 側欄條目卡片 */
#entry-card{display:none;padding:20px}
#entry-type-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;letter-spacing:2px;color:var(--gold);
  border:1px solid #4a3e2a;border-radius:2px;
  padding:3px 10px;margin-bottom:14px;
  font-family:'Cinzel',serif;
}
#entry-name{
  font-family:'Noto Serif TC',serif;font-size:20px;
  font-weight:400;color:var(--parchment);
  line-height:1.4;margin-bottom:6px;
}
#entry-name-en{font-size:13px;color:#7a6a50;margin-bottom:16px;letter-spacing:.5px}
#entry-year{font-size:12px;color:var(--gold-light);margin-bottom:16px;letter-spacing:1px}

#entry-img-wrap{
  width:100%;height:180px;background:var(--dark3);
  border-radius:4px;margin-bottom:16px;overflow:hidden;
  display:none;border:1px solid #3a3020;
}
#entry-img-wrap img{width:100%;height:100%;object-fit:cover;opacity:.9}

#entry-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tag{
  font-size:10px;padding:3px 10px;border-radius:2px;
  background:#2f2920;border:1px solid #3a3020;
  color:#9a8a6a;letter-spacing:1px;
}

#entry-extract{
  font-size:13px;line-height:1.9;color:#c0a880;
  border-left:2px solid #4a3e2a;padding-left:14px;
  margin-bottom:18px;
}
#entry-extract.loading{
  color:#5a4a30;font-style:italic;letter-spacing:.5px;
}

#entry-links{display:flex;gap:10px;flex-wrap:wrap}
.entry-link{
  font-size:11px;padding:6px 14px;border-radius:3px;
  border:1px solid #4a3e2a;color:var(--gold-light);
  text-decoration:none;display:inline-flex;align-items:center;gap:5px;
  cursor:pointer;background:transparent;transition:all .2s;
  letter-spacing:1px;font-family:'Cinzel',serif;
}
.entry-link:hover{background:#3a3020;border-color:var(--gold)}

/* ── 時間軸 ── */
#timeline-bar{
  position:fixed;bottom:0;left:0;right:0;height:var(--timeline-h);
  background:linear-gradient(0deg,#0f0d08 0%,#1a1510 100%);
  border-top:1px solid var(--gold);
  display:flex;align-items:center;gap:0;z-index:1000;
  padding:0 20px;
}
#play-btn{
  background:transparent;border:1px solid var(--gold);
  color:var(--gold);width:36px;height:36px;border-radius:50%;
  font-size:16px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;margin-right:16px;
}
#play-btn:hover{background:var(--gold);color:var(--dark)}

#year-display{
  font-family:'Cinzel',serif;font-size:22px;font-weight:600;
  color:var(--gold);min-width:110px;text-align:center;
  flex-shrink:0;letter-spacing:2px;line-height:1;
}
#year-era{font-size:10px;color:#7a6a50;letter-spacing:3px;margin-top:4px}

#slider-wrap{flex:1;margin:0 20px;position:relative}
#year-slider{
  width:100%;-webkit-appearance:none;appearance:none;
  height:3px;background:linear-gradient(90deg,#4a3e2a 0%,#6a5a3a 100%);
  border-radius:2px;outline:none;cursor:pointer;
}
#year-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--gold);border:2px solid var(--dark);
  box-shadow:0 0 10px rgba(201,168,76,.5);cursor:grab;
}
#year-slider::-webkit-slider-thumb:active{cursor:grabbing}
#slider-labels{
  display:flex;justify-content:space-between;
  padding:6px 0 0;font-size:9px;color:#4a3e2a;
  font-family:'Cinzel',serif;letter-spacing:1px;
}

/* ── 圖例 ── */
#legend{
  position:fixed;bottom:calc(var(--timeline-h) + 10px);left:10px;
  background:rgba(26,21,16,.9);border:1px solid #3a3020;
  border-radius:4px;padding:10px 14px;z-index:900;
}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px;color:#9a8a6a}
.legend-item:last-child{margin-bottom:0}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}

/* ── 篩選按鈕 ── */
#filter-bar{
  position:fixed;top:62px;left:10px;
  display:flex;flex-direction:column;gap:6px;z-index:900;
}
.filter-btn{
  background:rgba(26,21,16,.88);border:1px solid #3a3020;
  color:#9a8a6a;font-size:10px;padding:5px 10px;
  border-radius:3px;cursor:pointer;letter-spacing:1px;
  font-family:'Cinzel',serif;transition:all .2s;
  display:flex;align-items:center;gap:5px;
}
.filter-btn.active{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold)}
.filter-btn:hover{border-color:#6a5a3a;color:var(--gold-light)}

/* ── 載入指示 ── */
#loading-overlay{
  position:fixed;inset:0;background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .5s;
}
#loading-overlay h2{
  font-family:'Cinzel',serif;font-size:24px;color:var(--gold);
  letter-spacing:6px;margin-bottom:8px;
}
#loading-overlay p{font-size:12px;color:#6a5a40;letter-spacing:3px}
.loading-bar{
  width:200px;height:2px;background:#2a2015;margin-top:20px;border-radius:1px;overflow:hidden;
}
.loading-bar-inner{
  height:100%;background:var(--gold);border-radius:1px;
  animation:loadpulse 1.5s ease-in-out infinite;
}
@keyframes loadpulse{0%{width:0}50%{width:100%}100%{width:0}}

/* ── Leaflet 自訂 ── */
.leaflet-control-zoom a{
  background:var(--dark2)!important;color:var(--gold)!important;
  border-color:#3a3020!important;
}
.leaflet-control-zoom a:hover{background:var(--dark3)!important}
.leaflet-popup-content-wrapper{
  background:var(--dark2);border:1px solid var(--gold);
  border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.leaflet-popup-tip{background:var(--dark2)}
.leaflet-popup-content{color:var(--parchment);font-family:'Noto Sans TC',sans-serif;margin:10px 14px}

/* 自訂 marker */
.hm-marker{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;border:2px solid rgba(255,255,255,.35);
  cursor:pointer;transition:transform .15s;
  box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.hm-marker:hover{transform:scale(1.2)}
.hm-marker.event{background:#7a2a1a}
.hm-marker.person{background:#1a4a6a}
.hm-marker.artifact{background:#3a5a2a}
.hm-marker.building{background:#4a3a6a}
.hm-marker.regime{background:#6a4a1a}

/* 政權 polygon tooltip */
.regime-tooltip{
  background:rgba(26,21,16,.85)!important;
  border:1px solid var(--gold)!important;
  color:var(--gold)!important;
  font-family:'Cinzel',serif!important;
  font-size:11px!important;letter-spacing:1px!important;
  border-radius:3px!important;
  box-shadow:none!important;padding:4px 10px!important;
}
</style>
</head>
<body>

<div id="loading-overlay">
  <h2>HISTORICAL ATLAS</h2>
  <p data-zh="歷史地圖 載入中" data-en="Loading Historical Map">歷史地圖 載入中</p>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
</div>

<!-- 頂部標題列 -->
<div id="topbar">
  <h1>HISTORICAL ATLAS <span id="topbar-sub">世界歷史地圖</span></h1>
  <button id="lang-btn" onclick="toggleLang()">EN</button>
</div>

<!-- 篩選器 -->
<div id="filter-bar">
  <button class="filter-btn active" data-type="event" onclick="toggleFilter(this,'event')">⚔ <span data-zh="事件" data-en="Events">事件</span></button>
  <button class="filter-btn active" data-type="person" onclick="toggleFilter(this,'person')">◎ <span data-zh="人物" data-en="People">人物</span></button>
  <button class="filter-btn active" data-type="artifact" onclick="toggleFilter(this,'artifact')">⬡ <span data-zh="文物" data-en="Artifacts">文物</span></button>
  <button class="filter-btn active" data-type="building" onclick="toggleFilter(this,'building')">▲ <span data-zh="建築" data-en="Buildings">建築</span></button>
  <button class="filter-btn active" data-type="regime" onclick="toggleFilter(this,'regime')">✦ <span data-zh="政權" data-en="Regimes">政權</span></button>
</div>

<!-- 地圖 -->
<div id="map"></div>

<!-- 圖例 -->
<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#7a2a1a"></div><span data-zh="歷史事件" data-en="Events">歷史事件</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#1a4a6a"></div><span data-zh="人物出生地" data-en="Person Birthplace">人物出生地</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#3a5a2a"></div><span data-zh="文物出土點" data-en="Artifact Site">文物出土點</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#4a3a6a"></div><span data-zh="建築物位置" data-en="Buildings">建築物位置</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#6a4a1a"></div><span data-zh="政權中心" data-en="Regime Capital">政權中心</span></div>
</div>

<!-- 右側資訊面板 -->
<div id="panel">
  <div id="panel-header">
    <div id="panel-title" data-zh="歷史條目" data-en="Historical Entry">歷史條目</div>
    <div id="panel-subtitle" data-zh="點擊地圖上的標記查看詳情" data-en="Click a marker to view details">點擊地圖上的標記查看詳情</div>
  </div>
  <div id="panel-content">
    <div id="welcome">
      <div class="compass">🧭</div>
      <p>
        <span data-zh="拖動時間軸探索歷史" data-en="Drag the timeline to explore history">拖動時間軸探索歷史</span>
        <span data-zh="點擊任何標記查看詳情" data-en="Click any marker for details">點擊任何標記查看詳情</span>
        <span data-zh="使用篩選器控制顯示類型" data-en="Use filters to control marker types">使用篩選器控制顯示類型</span>
      </p>
    </div>
    <div id="entry-card">
      <div id="entry-type-badge"></div>
      <div id="entry-name"></div>
      <div id="entry-name-en"></div>
      <div id="entry-year"></div>
      <div id="entry-img-wrap"><img id="entry-img" src="" alt=""></div>
      <div id="entry-tags"></div>
      <div id="entry-extract"></div>
      <div id="entry-links"></div>
    </div>
  </div>
</div>

<!-- 時間軸 -->
<div id="timeline-bar">
  <button id="play-btn" onclick="togglePlay()" title="播放">▶</button>
  <div>
    <div id="year-display">500</div>
    <div id="year-era" data-zh="西元" data-en="CE">西元</div>
  </div>
  <div id="slider-wrap">
    <input type="range" id="year-slider" min="-3000" max="2000" value="500" step="10">
    <div id="slider-labels">
      <span>3000 BCE</span><span>2000 BCE</span><span>1000 BCE</span>
      <span>1 CE</span><span>500</span><span>1000</span><span>1500</span><span>2000</span>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

     coords:[[42,80],[48,125],[40,130],[28,122],[22,110],[20,100],[25,85],[35,80],[42,80]]},
    {yearStart:800,yearEnd:1200,name_zh:'阿拔斯哈里發國',name_en:'Abbasid Caliphate',color:'#2d5a27',
     coords:[[42,25],[38,65],[22,65],[15,45],[12,35],[20,22],[35,22],[42,25]]},
    {yearStart:1299,yearEnd:1923,name_zh:'鄂圖曼帝國',name_en:'Ottoman Empire',color:'#722f37',
     coords:[[48,20],[42,45],[35,45],[28,38],[25,28],[30,22],[40,20],[48,20]]},
    {yearStart:1556,yearEnd:1857,name_zh:'莫臥兒帝國',name_en:'Mughal Empire',color:'#556b2f',
     coords:[[36,65],[36,78],[28,82],[22,80],[15,78],[18,68],[22,60],[30,60],[36,65]]},
  ]
};

// Wikidata 查詢快取
const wdCache = {};

// ═══════════════════════════════════════════════════════
//  初始化地圖
// ═══════════════════════════════════════════════════════
function initMap(){
  map = L.map('map',{
    center:[30,30],zoom:3,
    minZoom:2,maxZoom:10,
    zoomControl:true,
  });

  // 古地圖風格底圖
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap &copy; CartoDB',
    subdomains:'abcd',maxZoom:19
  }).addTo(map);

  // 渲染初始狀態
  renderYear(currentYear);

  // 隱藏載入畫面
  setTimeout(()=>{
    const ov = document.getElementById('loading-overlay');
    ov.style.opacity='0';
    setTimeout(()=>ov.style.display='none',500);
  },1200);
}

// ═══════════════════════════════════════════════════════
//  自訂 Marker 圖示
// ═══════════════════════════════════════════════════════
const TYPE_ICONS = {
  event:   {emoji:'⚔',color:'#7a2a1a'},
  person:  {emoji:'◉',color:'#1a4a6a'},
  artifact:{emoji:'⬡',color:'#3a5a2a'},
  building:{emoji:'▲',color:'#4a3a6a'},
  regime:  {emoji:'✦',color:'#6a4a1a'},
};

function makeIcon(type){
  const cfg = TYPE_ICONS[type]||TYPE_ICONS.event;
  return L.divIcon({
    className:'',
    html:`<div class="hm-marker ${type}" title="${type}">${cfg.emoji}</div>`,
    iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-16]
  });
}

// ═══════════════════════════════════════════════════════
//  渲染指定年份
// ═══════════════════════════════════════════════════════
function renderYear(year){
  currentYear = year;
  updateYearDisplay(year);
  clearMarkers();
  clearRegimes();
  renderRegimes(year);
  renderMarkers(year);
}

function clearMarkers(){
  allMarkers.forEach(m=>map.removeLayer(m));
  allMarkers=[];
}
function clearRegimes(){
  regimeLayers.forEach(l=>map.removeLayer(l));
  regimeLayers=[];
}

function renderMarkers(year){
  HISTORY_DATA.forEach(d=>{
    if(!activeFilters.has(d.type)) return;
    const sy = d.year;
    const ey = d.endYear||d.year;
    // 顯示條件：年份在範圍內，±100年容忍
    if(year < sy-50 || year > ey+50) return;
    const marker = L.marker([d.lat,d.lng],{icon:makeIcon(d.type)})
      .addTo(map)
      .on('click',()=>openEntry(d));
    allMarkers.push(marker);
  });

  // Wikidata 補充（非同步）
  fetchWikidataMarkers(year);
}

function renderRegimes(year){
  REGIME_GEOJSON.regimes.forEach(r=>{
    if(year < r.yearStart || year > r.yearEnd) return;
    if(!activeFilters.has('regime')) return;
    const poly = L.polygon(r.coords.map(c=>[c[0],c[1]]),{
      color:r.color,weight:1.5,opacity:.7,
      fillColor:r.color,fillOpacity:.15,
      dashArray:'4,4'
    }).addTo(map);
    poly.bindTooltip(currentLang==='zh'?r.name_zh:r.name_en,{
      permanent:false,direction:'center',
      className:'regime-tooltip'
    });
    poly.on('click',()=>openRegimeEntry(r));
    regimeLayers.push(poly);
  });
}

// ═══════════════════════════════════════════════════════
//  Wikidata 補充查詢
// ═══════════════════════════════════════════════════════
async function fetchWikidataMarkers(year){
  const cacheKey = Math.round(year/50)*50;
  if(wdCache[cacheKey]) return; // 已查過
  wdCache[cacheKey] = true;

  const yearStart = year - 25;
  const yearEnd = year + 25;
  const sparql = `
SELECT DISTINCT ?item ?itemLabel ?lat ?lon ?typeLabel WHERE {
  ?item wdt:P585 ?date .
  FILTER(YEAR(?date) >= ${yearStart} && YEAR(?date) <= ${yearEnd})
  ?item wdt:P625 ?coord .
  BIND(geof:latitude(?coord) AS ?lat)
  BIND(geof:longitude(?coord) AS ?lon)
  OPTIONAL { ?item wdt:P31 ?type }
  SERVICE wikibase:label { bd:serviceParam wikibase:language "${currentLang==='zh'?'zh,en':'en'}". }
} LIMIT 30`;

  const url = 'https://query.wikidata.org/sparql?format=json&query='+encodeURIComponent(sparql);
  try{
    const res = await fetch(url,{headers:{Accept:'application/sparql-results+json'}});
    if(!res.ok) return;
    const data = await res.json();
    data.results.bindings.forEach(b=>{
      const lat = parseFloat(b.lat?.value);
      const lon = parseFloat(b.lon?.value);
      if(!lat||!lon||isNaN(lat)||isNaN(lon)) return;
      // 避免跟內建資料重疊（距離>0.5度）
      const dup = HISTORY_DATA.some(d=>Math.abs(d.lat-lat)<0.5&&Math.abs(d.lng-lon)<0.5);
      if(dup) return;
      const label = b.itemLabel?.value||'';
      if(!label || label.startsWith('Q')) return;
      const wdItem = {
        id:'wd_'+b.item.value.split('/').pop(),
        type:'event',lat,lng:lon,
        year,endYear:year,
        zh:label,en:label,
        tags_zh:['Wikidata'],tags_en:['Wikidata'],
        wiki_en:null,wd_id:b.item.value.split('/').pop()
      };
      const m = L.marker([lat,lon],{icon:makeIcon('event'),opacity:.7})
        .addTo(map)
        .on('click',()=>openEntry(wdItem));
      allMarkers.push(m);
    });
  }catch(e){}
}

// ═══════════════════════════════════════════════════════
//  側欄：開啟條目
// ═══════════════════════════════════════════════════════
function openEntry(d){
  document.getElementById('welcome').style.display='none';
  const card = document.getElementById('entry-card');
  card.style.display='block';

  const isZh = currentLang==='zh';
  const typeLabelMap={event:{zh:'歷史事件',en:'Historical Event'},person:{zh:'人物',en:'Person'},artifact:{zh:'文物',en:'Artifact'},building:{zh:'建築',en:'Building'},regime:{zh:'政權',en:'Regime'}};
  const tl = typeLabelMap[d.type]||{zh:'條目',en:'Entry'};

  document.getElementById('entry-type-badge').textContent = isZh?tl.zh:tl.en;
  document.getElementById('entry-name').textContent = isZh?d.zh:d.en;
  document.getElementById('entry-name-en').textContent = isZh?d.en:d.zh;

  // 年份顯示
  const yStr = d.year<0?`西元前 ${Math.abs(d.year)} 年`:`西元 ${d.year} 年`;
  const yStrEn = d.year<0?`${Math.abs(d.year)} BCE`:`${d.year} CE`;
  const eyStr = d.endYear&&d.endYear!==d.year?(d.year<0?` — 西元前 ${Math.abs(d.endYear)} 年`:` — ${d.endYear} 年`):'';
  document.getElementById('entry-year').textContent = isZh?(yStr+eyStr):(yStrEn+(d.endYear&&d.endYear!==d.year?` — ${d.endYear} CE`:''));

  // 標籤
  const tags = isZh?(d.tags_zh||[]):(d.tags_en||[]);
  document.getElementById('entry-tags').innerHTML = tags.map(t=>`<span class="tag">${t}</span>`).join('');

  // 圖片先隱藏
  document.getElementById('entry-img-wrap').style.display='none';

  // 摘述先顯示載入中
  const ex = document.getElementById('entry-extract');
  ex.className='entry-extract loading';
  ex.textContent = isZh?'資料載入中…':'Loading...';

  // 連結
  const linksEl = document.getElementById('entry-links');
  linksEl.innerHTML='';
  if(d.wiki_zh||d.wiki_en){
    const wikiUrl = isZh&&d.wiki_zh
      ?`https://zh.wikipedia.org/wiki/${encodeURIComponent(d.wiki_zh)}`
      :`https://en.wikipedia.org/wiki/${encodeURIComponent(d.wiki_en||d.wiki_zh)}`;
    linksEl.innerHTML=`<a class="entry-link" href="${wikiUrl}" target="_blank">◈ Wikipedia</a>`;
  }

  // 非同步抓 Wikipedia
  fetchWikiSummary(d);
}

function openRegimeEntry(r){
  const fakeEntry = {
    id:'regime_'+r.name_en.replace(/ /g,'_'),
    type:'regime',lat:r.coords[0][0],lng:r.coords[0][1],
    year:r.yearStart,endYear:r.yearEnd,
    zh:r.name_zh,en:r.name_en,
    tags_zh:['政權','帝國'],tags_en:['Regime','Empire'],
    wiki_zh:r.name_zh,wiki_en:r.name_en.replace(/ /g,'_')
  };
  openEntry(fakeEntry);
}

// ═══════════════════════════════════════════════════════
//  Wikipedia API 抓取
// ═══════════════════════════════════════════════════════
const wikiCache={};
async function fetchWikiSummary(d){
  const isZh = currentLang==='zh';
  const lang = isZh?'zh':'en';
  const title = isZh?(d.wiki_zh||d.wiki_en||d.zh):(d.wiki_en||d.wiki_zh||d.en);
  if(!title){
    setExtract(isZh?'暫無詳細資料。':'No detailed information available.');
    return;
  }
  const cacheKey = lang+'_'+title;
  if(wikiCache[cacheKey]){
    applyWikiData(wikiCache[cacheKey]);
    return;
  }
  const url = `https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error('not found');
    const data = await res.json();
    wikiCache[cacheKey]=data;
    applyWikiData(data);
  }catch(e){
    // fallback: 嘗試英文
    if(isZh&&d.wiki_en){
      try{
        const res2 = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(d.wiki_en)}`);
        if(res2.ok){const data2=await res2.json();wikiCache[cacheKey]=data2;applyWikiData(data2);return;}
      }catch(e2){}
    }
    setExtract(isZh?'目前無法載入資料，請稍後再試。':'Could not load data. Please try again.');
  }
}

function applyWikiData(data){
  const ex = document.getElementById('entry-extract');
  ex.className='entry-extract';
  ex.textContent = data.extract||'No summary available.';

  // 圖片
  if(data.thumbnail&&data.thumbnail.source){
    const imgWrap = document.getElementById('entry-img-wrap');
    const img = document.getElementById('entry-img');
    img.src = data.thumbnail.source;
    img.onerror=()=>imgWrap.style.display='none';
    imgWrap.style.display='block';
  }

  // 補充維基連結
  if(data.content_urls){
    const linksEl = document.getElementById('entry-links');
    if(!linksEl.querySelector('a')){
      const url = data.content_urls.desktop?.page||'';
      if(url) linksEl.innerHTML=`<a class="entry-link" href="${url}" target="_blank">◈ Wikipedia</a>`;
    }
  }
}

function setExtract(txt){
  const ex=document.getElementById('entry-extract');
  ex.className='entry-extract';
  ex.textContent=txt;
}

// ═══════════════════════════════════════════════════════
//  時間軸控制
// ═══════════════════════════════════════════════════════
const slider = ()=>document.getElementById('year-slider');

function updateYearDisplay(year){
  const el = document.getElementById('year-display');
  const era = document.getElementById('year-era');
  if(year<0){
    el.textContent = Math.abs(year);
    era.textContent = currentLang==='zh'?'西元前':'BCE';
  } else {
    el.textContent = year===0?1:year;
    era.textContent = currentLang==='zh'?'西元':'CE';
  }
}

document.getElementById('year-slider').addEventListener('input',function(){
  const y = parseInt(this.value);
  renderYear(y);
});

let playSpeed = 20; // 每步年數
function togglePlay(){
  playing=!playing;
  document.getElementById('play-btn').textContent=playing?'⏸':'▶';
  if(playing) stepPlay();
}
function stepPlay(){
  if(!playing) return;
  let y = parseInt(slider().value)+playSpeed;
  if(y>2000){y=-3000;}
  slider().value=y;
  renderYear(y);
  playTimer=setTimeout(stepPlay,400);
}

// ═══════════════════════════════════════════════════════
//  語言切換
// ═══════════════════════════════════════════════════════
function toggleLang(){
  currentLang = currentLang==='zh'?'en':'zh';
  document.getElementById('lang-btn').textContent = currentLang==='zh'?'EN':'中';
  document.documentElement.lang = currentLang==='zh'?'zh-TW':'en';

  // 更新所有 data-zh/data-en 元素
  document.querySelectorAll('[data-zh]').forEach(el=>{
    el.textContent = currentLang==='zh'?el.dataset.zh:el.dataset.en;
  });

  // 重新渲染（更新 tooltip 語言）
  clearRegimes();
  renderRegimes(currentYear);
  updateYearDisplay(currentYear);

  // 若側欄有開啟的條目，重新清空（讓使用者重新點選）
  wikiCache; // 快取保留，語言切換後重抓
}

// ═══════════════════════════════════════════════════════
//  篩選器
// ═══════════════════════════════════════════════════════
function toggleFilter(btn,type){
  if(activeFilters.has(type)){
    activeFilters.delete(type);
    btn.classList.remove('active');
  } else {
    activeFilters.add(type);
    btn.classList.add('active');
  }
  clearMarkers();
  clearRegimes();
  renderRegimes(currentYear);
  renderMarkers(currentYear);
}

// ═══════════════════════════════════════════════════════
//  啟動
// ═══════════════════════════════════════════════════════
window.addEventListener('load',initMap);
</script>
